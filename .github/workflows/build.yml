name: Build & Release APK

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/ink2latex.keystore \
            -alias ink2latex \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ink2latex123 \
            -keypass ink2latex123 \
            -dname "CN=Ink2LaTeX, OU=Dev, O=Ink2LaTeX, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=ink2latex123
          keyPassword=ink2latex123
          keyAlias=ink2latex
          storeFile=ink2latex.keystore
          EOF

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ink2latex-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
